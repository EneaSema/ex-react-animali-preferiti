<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css" />
    <!-- inserisco gli script per React, ReactDOM e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- fine inserimento script -->
    <!-- script per creazione componente -->
    <script type="text/babel">
      const { useState } = React;

      //   aggiungo la MODALE

      function Modal({
        title,
        content,
        show = false,
        onClose = () => {},
        onConfirm = () => {},
      }) {
        return (
          show &&
          ReactDOM.createPortal(
            <div className="modal-container">
              <div className="modal">
                <h2>{title}</h2>
                {content}
                <div>
                  <button onClick={onClose}>Annulla</button>
                  <button onClick={onConfirm}>Conferma</button>
                </div>
              </div>
            </div>,
            document.body
          )
        );
      }

      const ListaAnimali = () => {
        // const animals = [`cane`, `gatto`, `lupo`]; array inventato da me
        const [animals, setAnimals] = useState([]);
        // creo variabili dinamica per lo stato show(vedo / non vedo) della modale
        const [show, setShow] = useState(false);
        // creo variabile dinamica per lo variabile value
        // per gestire la sincronizzazione tra quello che scrive utente e quello che vede
        const [animalName, setAnimalName] = useState(``);

        // array della milestone 2
        // const animalsChoices = [
        //   "Cane",
        //   "Gatto",
        //   "Pappagallo",
        //   "Cavallo",
        //   "Panda",
        // ];
        const addAnimal = (event) => {
          event.preventDefault();
          //   controllo se presente animale, in caso di mancanza non faccio niente
          if (!animalName) return;
          //   duplico il vecchio array tramite spread operator ed aggiungo il nuovo elemento per attivare la reattività
          setAnimals([...animals, animalName]);
          //   rimetto valore a stringa vuota
          setAnimalName(``);
          //   chiudo la modale
          setShow(false);
          // soluzione per milestone 2
          //   const animalRandom = Math.floor(
          //     Math.random() * animalsChoices.length
          //   );
          //   const animal = animalsChoices[animalRandom];
          //   setAnimals([...animals, animal]);
        };
        return (
          <>
            <button onClick={() => setShow(true)}>Aggiungi Animale</button>
            <details>
              <summary>Animali</summary>
              <ul>
                {animals &&
                  animals.map((animal, i) => <li key={i}>{animal}</li>)}
              </ul>
            </details>
            <Modal
              show={show}
              onClose={() => setShow(false)}
              onConfirm={addAnimal}
              title="Aggiungi Animale"
              content={
                <>
                  <input
                    type="text"
                    value={animalName}
                    onChange={(e) => setAnimalName(e.target.value)}
                  />
                </>
              }
            />
          </>
        );
      };
    </script>
    <!-- creazione script per montaggio -->
    <script type="text/babel">
      const { createRoot } = ReactDOM;
      const listaAnimali = document.querySelector(`.lista-animali`);
      const root = createRoot(listaAnimali);
      root.render(<ListaAnimali />);
    </script>
  </head>
  <body>
    <header>
      <h1>I miei animali Preferiti</h1>
    </header>
    <main>
      <div class="lista-animali"></div>
      <figure>
        <img src="https://picsum.photos/400/300" alt="Immagine Casuale" />
      </figure>
      <div class="lista-animali"></div>
    </main>
    <footer>
      <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
  </body>
</html>
